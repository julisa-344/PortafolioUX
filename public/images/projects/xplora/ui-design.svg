<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" fill="#f5f5d9"/>
  <!-- UI Design mockup -->
  <rect x="100" y="80" width="1000" height="740" rx="16" fill="#ebe8cc" stroke="#911A1C" stroke-width="2"/>
  <!-- Header -->
  <rect x="120" y="100" width="960" height="60" rx="8" fill="#911A1C"/>
  <circle cx="160" cy="130" r="20" fill="#f5f5d9" fill-opacity="0.3"/>
  <rect x="200" y="120" width="100" height="20" rx="4" fill="#f5f5d9" fill-opacity="0.5"/>
  <!-- Hero section -->
  <rect x="120" y="180" width="460" height="300" rx="12" fill="#911A1C" fill-opacity="0.15"/>
  <rect x="150" y="220" width="200" height="32" rx="4" fill="#911A1C"/>
  <rect x="150" y="270" width="350" height="16" rx="4" fill="#a85456"/>
  <rect x="150" y="300" width="300" height="16" rx="4" fill="#a85456"/>
  <rect x="150" y="340" width="120" height="40" rx="20" fill="#911A1C"/>
  <!-- Cards -->
  <rect x="600" y="180" width="230" height="300" rx="12" fill="#e0ddc0"/>
  <rect x="850" y="180" width="230" height="300" rx="12" fill="#e0ddc0"/>
  <rect x="620" y="200" width="190" height="120" rx="8" fill="#c9a5a6"/>
  <rect x="870" y="200" width="190" height="120" rx="8" fill="#c9a5a6"/>
  <rect x="620" y="340" width="150" height="16" rx="4" fill="#911A1C"/>
  <rect x="870" y="340" width="150" height="16" rx="4" fill="#911A1C"/>
  <rect x="620" y="370" width="100" height="12" rx="4" fill="#a85456"/>
  <rect x="870" y="370" width="100" height="12" rx="4" fill="#a85456"/>
  <!-- Bottom section -->
  <rect x="120" y="500" width="310" height="200" rx="12" fill="#e0ddc0"/>
  <rect x="450" y="500" width="310" height="200" rx="12" fill="#e0ddc0"/>
  <rect x="780" y="500" width="310" height="200" rx="12" fill="#e0ddc0"/>
  <!-- Color palette -->
  <rect x="120" y="730" width="60" height="60" rx="8" fill="#911A1C"/>
  <rect x="190" y="730" width="60" height="60" rx="8" fill="#f5f5d9" stroke="#c9a5a6"/>
  <rect x="260" y="730" width="60" height="60" rx="8" fill="#6d1315"/>
  <rect x="330" y="730" width="60" height="60" rx="8" fill="#a85456"/>
  <text x="600" y="850" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="20" font-weight="600">UI Design System</text>
</svg>
