<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" fill="#f5f5d9"/>
  <!-- Sitemap structure -->
  <rect x="500" y="50" width="200" height="60" rx="8" fill="#911A1C"/>
  <text x="600" y="88" text-anchor="middle" fill="#f5f5d9" font-family="system-ui" font-size="16" font-weight="600">HOME</text>
  <!-- Lines -->
  <line x1="600" y1="110" x2="600" y2="160" stroke="#911A1C" stroke-width="2"/>
  <line x1="200" y1="160" x2="1000" y2="160" stroke="#911A1C" stroke-width="2"/>
  <line x1="200" y1="160" x2="200" y2="200" stroke="#911A1C" stroke-width="2"/>
  <line x1="400" y1="160" x2="400" y2="200" stroke="#911A1C" stroke-width="2"/>
  <line x1="600" y1="160" x2="600" y2="200" stroke="#911A1C" stroke-width="2"/>
  <line x1="800" y1="160" x2="800" y2="200" stroke="#911A1C" stroke-width="2"/>
  <line x1="1000" y1="160" x2="1000" y2="200" stroke="#911A1C" stroke-width="2"/>
  <!-- Level 2 -->
  <rect x="100" y="200" width="200" height="50" rx="8" fill="#e0ddc0"/>
  <text x="200" y="232" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="14">Explorar</text>
  <rect x="300" y="200" width="200" height="50" rx="8" fill="#e0ddc0"/>
  <text x="400" y="232" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="14">Recompensas</text>
  <rect x="500" y="200" width="200" height="50" rx="8" fill="#e0ddc0"/>
  <text x="600" y="232" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="14">Negocios</text>
  <rect x="700" y="200" width="200" height="50" rx="8" fill="#e0ddc0"/>
  <text x="800" y="232" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="14">Perfil</text>
  <rect x="900" y="200" width="200" height="50" rx="8" fill="#e0ddc0"/>
  <text x="1000" y="232" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="14">Ayuda</text>
  <!-- Level 3 boxes -->
  <line x1="200" y1="250" x2="200" y2="300" stroke="#911A1C" stroke-width="2"/>
  <rect x="100" y="300" width="200" height="40" rx="6" fill="#ebe8cc"/>
  <rect x="100" y="350" width="200" height="40" rx="6" fill="#ebe8cc"/>
  <rect x="100" y="400" width="200" height="40" rx="6" fill="#ebe8cc"/>
  <line x1="400" y1="250" x2="400" y2="300" stroke="#911A1C" stroke-width="2"/>
  <rect x="300" y="300" width="200" height="40" rx="6" fill="#ebe8cc"/>
  <rect x="300" y="350" width="200" height="40" rx="6" fill="#ebe8cc"/>
  <text x="600" y="70" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="12">SITEMAP</text>
</svg>
