<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f5f5d9"/>
  <!-- Detail page mockup -->
  <rect x="50" y="50" width="700" height="500" rx="16" fill="#ebe8cc" stroke="#c9a5a6" stroke-width="2"/>
  <!-- Header image -->
  <rect x="70" y="70" width="660" height="200" rx="12" fill="#911A1C" fill-opacity="0.2"/>
  <!-- Cafe logo -->
  <circle cx="150" cy="250" r="50" fill="#e0ddc0" stroke="#911A1C" stroke-width="3"/>
  <!-- Info -->
  <rect x="220" y="220" width="200" height="24" rx="4" fill="#911A1C"/>
  <rect x="220" y="254" width="150" height="16" rx="4" fill="#a85456"/>
  <!-- Rating -->
  <rect x="500" y="220" width="80" height="30" rx="15" fill="#911A1C"/>
  <rect x="590" y="220" width="120" height="30" rx="15" fill="#c9a5a6" fill-opacity="0.5"/>
  <!-- Tabs -->
  <rect x="70" y="300" width="100" height="30" rx="4" fill="#911A1C"/>
  <rect x="180" y="300" width="100" height="30" rx="4" fill="#c9a5a6" fill-opacity="0.5"/>
  <rect x="290" y="300" width="100" height="30" rx="4" fill="#c9a5a6" fill-opacity="0.5"/>
  <!-- Content -->
  <rect x="70" y="350" width="320" height="180" rx="12" fill="#e0ddc0"/>
  <rect x="410" y="350" width="320" height="85" rx="12" fill="#c9a5a6" fill-opacity="0.5"/>
  <rect x="410" y="445" width="320" height="85" rx="12" fill="#c9a5a6" fill-opacity="0.5"/>
  <!-- Map placeholder -->
  <rect x="90" y="370" width="280" height="140" rx="8" fill="#c9a5a6" fill-opacity="0.5"/>
  <circle cx="230" cy="440" r="20" fill="#911A1C"/>
  <text x="400" y="580" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="16">Café Detail Page</text>
</svg>
