  <text x="600" y="70" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="14">Detail</text>
  <text x="975" y="70" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="14">Profile</text>
  <text x="600" y="860" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="20" font-weight="600">Wireframes</text>
