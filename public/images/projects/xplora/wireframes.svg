  <rect x="70" y="450" width="310" height="80" rx="8" fill="#c9a5a6" fill-opacity="0.5"/>
  <rect x="70" y="550" width="310" height="80" rx="8" fill="#c9a5a6" fill-opacity="0.5"/>
  <rect x="70" y="650" width="310" height="80" rx="8" fill="#c9a5a6" fill-opacity="0.5"/>
