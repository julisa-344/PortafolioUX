<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" fill="#f5f5d9"/>
  <!-- Moodboard layout -->
  <text x="600" y="60" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="24" font-weight="600">Brand Strategy & Moodboard</text>
  <!-- Color palette -->
  <rect x="50" y="100" width="250" height="350" rx="12" fill="#ebe8cc"/>
  <text x="175" y="140" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="14">COLOR PALETTE</text>
  <rect x="70" y="170" width="80" height="80" rx="8" fill="#911A1C"/>
  <rect x="160" y="170" width="80" height="80" rx="8" fill="#6d1315"/>
  <rect x="70" y="260" width="80" height="80" rx="8" fill="#f5f5d9" stroke="#c9a5a6"/>
  <rect x="160" y="260" width="80" height="80" rx="8" fill="#ebe8cc"/>
  <rect x="70" y="350" width="170" height="80" rx="8" fill="#a85456"/>
  <!-- Typography -->
  <rect x="320" y="100" width="350" height="350" rx="12" fill="#ebe8cc"/>
  <text x="495" y="140" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="14">TYPOGRAPHY</text>
  <text x="340" y="200" fill="#911A1C" font-family="serif" font-size="48" font-weight="300">Aa</text>
  <text x="340" y="260" fill="#911A1C" font-family="serif" font-size="24">Playfair Display</text>
  <text x="340" y="320" fill="#a85456" font-family="system-ui" font-size="32">Aa</text>
  <text x="340" y="370" fill="#a85456" font-family="system-ui" font-size="18">Inter</text>
  <!-- Mood images -->
  <rect x="690" y="100" width="460" height="350" rx="12" fill="#ebe8cc"/>
  <rect x="710" y="130" width="200" height="140" rx="8" fill="#c9a5a6"/>
  <rect x="930" y="130" width="200" height="140" rx="8" fill="#c9a5a6"/>
  <rect x="710" y="290" width="420" height="140" rx="8" fill="#c9a5a6"/>
  <!-- Brand values -->
  <rect x="50" y="480" width="1100" height="370" rx="12" fill="#ebe8cc"/>
  <text x="600" y="530" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="14">BRAND VALUES</text>
  <rect x="100" y="570" width="300" height="120" rx="8" fill="#e0ddc0"/>
  <text x="250" y="640" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="20" font-weight="600">Exclusividad</text>
  <rect x="450" y="570" width="300" height="120" rx="8" fill="#e0ddc0"/>
  <text x="600" y="640" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="20" font-weight="600">Artesanía</text>
  <rect x="800" y="570" width="300" height="120" rx="8" fill="#e0ddc0"/>
  <text x="950" y="640" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="20" font-weight="600">Sostenibilidad</text>
  <circle cx="250" cy="760" r="30" fill="#911A1C"/>
  <circle cx="600" cy="760" r="30" fill="#911A1C"/>
  <circle cx="950" cy="760" r="30" fill="#911A1C"/>
</svg>
