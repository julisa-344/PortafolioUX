<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f5f5d9"/>
  <!-- Checkout page -->
  <rect x="50" y="50" width="700" height="500" rx="16" fill="#ebe8cc" stroke="#c9a5a6" stroke-width="2"/>
  <!-- Header -->
  <rect x="70" y="70" width="660" height="50" rx="4" fill="#911A1C"/>
  <text x="400" y="102" text-anchor="middle" fill="#f5f5d9" font-family="serif" font-size="16" font-weight="300">SANDRA JORDAN</text>
  <!-- Progress steps -->
  <circle cx="200" cy="160" r="16" fill="#911A1C"/>
  <text x="200" y="165" text-anchor="middle" fill="#f5f5d9" font-family="system-ui" font-size="12">1</text>
  <line x1="216" y1="160" x2="334" y2="160" stroke="#911A1C" stroke-width="2"/>
  <circle cx="350" cy="160" r="16" fill="#911A1C"/>
  <text x="350" y="165" text-anchor="middle" fill="#f5f5d9" font-family="system-ui" font-size="12">2</text>
  <line x1="366" y1="160" x2="484" y2="160" stroke="#c9a5a6" stroke-width="2"/>
  <circle cx="500" cy="160" r="16" fill="#c9a5a6"/>
  <text x="500" y="165" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="12">3</text>
  <text x="200" y="195" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="10">Shipping</text>
  <text x="350" y="195" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="10">Payment</text>
  <text x="500" y="195" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="10">Confirm</text>
  <!-- Form section -->
  <rect x="70" y="220" width="400" height="300" rx="8" fill="#e0ddc0"/>
  <text x="90" y="250" fill="#911A1C" font-family="system-ui" font-size="14" font-weight="600">Payment Method</text>
  <!-- Card input -->
  <rect x="90" y="275" width="360" height="50" rx="8" fill="#f5f5d9"/>
  <text x="110" y="305" fill="#a85456" font-family="system-ui" font-size="12">Card Number</text>
  <rect x="90" y="340" width="170" height="50" rx="8" fill="#f5f5d9"/>
  <text x="110" y="370" fill="#a85456" font-family="system-ui" font-size="12">Expiry</text>
  <rect x="280" y="340" width="170" height="50" rx="8" fill="#f5f5d9"/>
  <text x="300" y="370" fill="#a85456" font-family="system-ui" font-size="12">CVV</text>
  <rect x="90" y="405" width="360" height="50" rx="8" fill="#f5f5d9"/>
  <text x="110" y="435" fill="#a85456" font-family="system-ui" font-size="12">Name on Card</text>
  <rect x="90" y="470" width="360" height="40" rx="20" fill="#911A1C"/>
  <text x="270" y="496" text-anchor="middle" fill="#f5f5d9" font-family="system-ui" font-size="14">Continue to Confirmation</text>
  <!-- Order summary -->
  <rect x="490" y="220" width="230" height="300" rx="8" fill="#e0ddc0"/>
  <text x="510" y="250" fill="#911A1C" font-family="system-ui" font-size="14" font-weight="600">Order Summary</text>
  <rect x="510" y="275" width="50" height="50" rx="4" fill="#c9a5a6"/>
  <rect x="570" y="280" width="120" height="14" rx="4" fill="#a85456" fill-opacity="0.3"/>
  <rect x="570" y="305" width="60" height="12" rx="4" fill="#911A1C" fill-opacity="0.3"/>
  <rect x="510" y="345" width="50" height="50" rx="4" fill="#c9a5a6"/>
  <rect x="570" y="350" width="120" height="14" rx="4" fill="#a85456" fill-opacity="0.3"/>
  <rect x="570" y="375" width="60" height="12" rx="4" fill="#911A1C" fill-opacity="0.3"/>
  <line x1="510" y1="420" x2="700" y2="420" stroke="#c9a5a6" stroke-width="1"/>
  <text x="510" y="450" fill="#a85456" font-family="system-ui" font-size="12">Subtotal</text>
  <text x="670" y="450" text-anchor="end" fill="#a85456" font-family="system-ui" font-size="12">$800</text>
  <text x="510" y="475" fill="#a85456" font-family="system-ui" font-size="12">Shipping</text>
  <text x="670" y="475" text-anchor="end" fill="#a85456" font-family="system-ui" font-size="12">Free</text>
  <line x1="510" y1="490" x2="700" y2="490" stroke="#c9a5a6" stroke-width="1"/>
  <text x="510" y="515" fill="#911A1C" font-family="system-ui" font-size="14" font-weight="600">Total</text>
  <text x="670" y="515" text-anchor="end" fill="#6d1315" font-family="system-ui" font-size="14" font-weight="600">$800</text>
  <text x="400" y="580" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="16">Checkout Experience</text>
</svg>
