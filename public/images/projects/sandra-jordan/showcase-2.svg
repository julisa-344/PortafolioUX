<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f5f5d9"/>
  <!-- Product detail page -->
  <rect x="50" y="50" width="700" height="500" rx="16" fill="#ebe8cc" stroke="#c9a5a6" stroke-width="2"/>
  <!-- Product image -->
  <rect x="70" y="70" width="320" height="400" rx="12" fill="#c9a5a6" fill-opacity="0.3"/>
  <rect x="90" y="490" width="60" height="40" rx="4" fill="#e0ddc0" stroke="#911A1C" stroke-width="2"/>
  <rect x="160" y="490" width="60" height="40" rx="4" fill="#e0ddc0"/>
  <rect x="230" y="490" width="60" height="40" rx="4" fill="#e0ddc0"/>
  <!-- Product info -->
  <text x="420" y="100" fill="#a85456" font-family="system-ui" font-size="12">PRIMA ALPACA</text>
  <text x="420" y="140" fill="#911A1C" font-family="serif" font-size="28" font-weight="300">Luxury Alpaca Throw</text>
  <text x="420" y="180" fill="#6d1315" font-family="system-ui" font-size="24" font-weight="600">$480.00</text>
  <rect x="420" y="210" width="300" height="12" rx="4" fill="#a85456" fill-opacity="0.3"/>
  <rect x="420" y="230" width="280" height="12" rx="4" fill="#a85456" fill-opacity="0.3"/>
  <rect x="420" y="250" width="260" height="12" rx="4" fill="#a85456" fill-opacity="0.3"/>
  <!-- Color options -->
  <text x="420" y="300" fill="#a85456" font-family="system-ui" font-size="12">COLOR</text>
  <circle cx="440" cy="330" r="16" fill="#911A1C"/>
  <circle cx="480" cy="330" r="16" fill="#c9a5a6"/>
  <circle cx="520" cy="330" r="16" fill="#a85456"/>
  <circle cx="560" cy="330" r="16" fill="#f5f5d9" stroke="#c9a5a6"/>
  <!-- Size options -->
  <text x="420" y="380" fill="#a85456" font-family="system-ui" font-size="12">SIZE</text>
  <rect x="420" y="400" width="60" height="36" rx="4" fill="#911A1C"/>
  <text x="450" y="424" text-anchor="middle" fill="#f5f5d9" font-family="system-ui" font-size="12">S</text>
  <rect x="490" y="400" width="60" height="36" rx="4" fill="#e0ddc0"/>
  <text x="520" y="424" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="12">M</text>
  <rect x="560" y="400" width="60" height="36" rx="4" fill="#e0ddc0"/>
  <text x="590" y="424" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="12">L</text>
  <!-- CTA buttons -->
  <rect x="420" y="460" width="150" height="50" rx="25" fill="#911A1C"/>
  <text x="495" y="492" text-anchor="middle" fill="#f5f5d9" font-family="system-ui" font-size="14">Add to Cart</text>
  <rect x="580" y="460" width="140" height="50" rx="25" fill="#f5f5d9" stroke="#911A1C" stroke-width="2"/>
  <text x="650" y="492" text-anchor="middle" fill="#911A1C" font-family="system-ui" font-size="14">Wishlist</text>
  <text x="400" y="580" text-anchor="middle" fill="#a85456" font-family="system-ui" font-size="16">Product Detail Page</text>
</svg>
